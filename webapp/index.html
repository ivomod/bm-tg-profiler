<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BM TG Profiler</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #222535;
      --border: #2d3149;
      --accent: #3b82f6;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --success: #10b981;
      --error: #ef4444;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --log-bg: #080a11;
    }

    html.light {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --accent: #2563eb;
      --text: #0f172a;
      --text-muted: #64748b;
      --success: #059669;
      --error: #dc2626;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --log-bg: #f1f5f9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: var(--accent); }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .header-title { font-size: 1.1rem; font-weight: 700; }
    .header-title span { color: var(--accent); }
    .header-sub { font-size: 0.75rem; color: var(--text-muted); }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1.25rem;
      align-items: start;
    }

    @media (max-width: 800px) {
      .container { grid-template-columns: 1fr; padding: 1rem; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--shadow);
    }

    .stack > .card + .card { margin-top: 1.25rem; }

    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }

    input, select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.85rem;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus { border-color: var(--accent); }

    .form-group { margin-bottom: 0.85rem; }

    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 2.5rem; }
    .eye-btn {
      position: absolute; right: 0.7rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 0.9rem; padding: 0; line-height: 1;
    }
    .eye-btn:hover { color: var(--text); }

    .help { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.25rem; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.55rem 1.1rem;
      border-radius: 8px; border: none;
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #ffffff; }
    .btn-primary:hover:not(:disabled) { background: #60a5fa; }
    html.light .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-secondary {
      background: var(--surface-2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-ghost { background: none; border: 1px solid transparent; color: var(--text-muted); }
    .btn-ghost:hover:not(:disabled) { color: var(--error); border-color: rgba(239,68,68,0.3); }
    .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.75rem; border-radius: 6px; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-full { width: 100%; justify-content: center; }

    /* Profile list */
    .profile-list { display: flex; flex-direction: column; gap: 0.65rem; }

    .profile-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .profile-item:hover { border-color: #4a5180; }
    .profile-item.selected { border-color: var(--accent); background: rgba(59,130,246,0.06); }

    .profile-name { font-weight: 600; font-size: 0.875rem; }
    .profile-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }

    .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.6rem; }
    .tag {
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3);
      color: var(--accent); border-radius: 5px;
      padding: 0.15rem 0.45rem; font-size: 0.72rem; font-family: monospace;
      display: inline-flex; align-items: center; gap: 0.25rem;
    }
    .tag-x { cursor: pointer; opacity: 0.6; font-size: 0.85rem; line-height: 1; }
    .tag-x:hover { opacity: 1; color: var(--error); }
    .tg-name {
      font-family: system-ui, sans-serif; font-size: 0.68rem;
      color: var(--text-muted); font-weight: 400;
      max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .profile-actions { display: flex; gap: 0.4rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .ml-auto { margin-left: auto; }

    /* Steps */
    .steps { display: flex; flex-direction: column; gap: 0.45rem; margin: 1rem 0; }
    .step {
      display: flex; align-items: center; gap: 0.65rem;
      font-size: 0.82rem; color: var(--text-muted);
    }
    .step-dot {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700;
    }
    .step.s-done { color: var(--text); }
    .step.s-done .step-dot { background: rgba(16,185,129,0.15); border-color: var(--success); color: var(--success); }
    .step.s-run { color: var(--accent); }
    .step.s-run .step-dot { background: rgba(59,130,246,0.15); border-color: var(--accent); animation: pulse 0.9s ease infinite; }
    .step.s-err { color: var(--error); }
    .step.s-err .step-dot { background: rgba(239,68,68,0.15); border-color: var(--error); color: var(--error); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* Status badge */
    .badge {
      padding: 0.2rem 0.65rem; border-radius: 100px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.03em;
    }
    .badge-idle { background: rgba(100,116,139,0.15); color: var(--text-muted); }
    .badge-run  { background: rgba(59,130,246,0.15);  color: var(--accent); }
    .badge-ok   { background: rgba(16,185,129,0.15);  color: var(--success); }
    .badge-err  { background: rgba(239,68,68,0.15);   color: var(--error); }

    /* Header controls */
    .header-controls { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }

    .theme-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s;
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--text-muted);
      font-size: 0.8rem; font-weight: 600;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

    #langSelect {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.8rem; font-weight: 600;
      transition: border-color 0.15s;
      width: auto;
    }
    #langSelect:hover { border-color: var(--accent); color: var(--accent); }

    /* Log */
    .log {
      background: var(--log-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      min-height: 260px;
      max-height: 480px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.775rem;
      line-height: 1.75;
    }
    .log-row { display: flex; gap: 0.65rem; }
    .log-ts { color: var(--text-muted); flex-shrink: 0; width: 78px; }
    .c-info    { color: var(--text); }
    .c-success { color: var(--success); }
    .c-error   { color: var(--error); }
    .c-muted   { color: var(--text-muted); }
    .log-sep { height: 1px; background: var(--border); margin: 0.5rem 0; }

    /* Current groups */
    .group-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .chip {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.2rem 0.55rem;
      font-size: 0.75rem; font-family: monospace;
    }
    .chip span { color: var(--text-muted); }

    /* Modal */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(3px);
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      width: 90%; max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1.2rem; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.25rem; }

    .add-row { display: flex; gap: 0.5rem; }
    .add-row input { flex: 1; }

    /* Toasts */
    .toasts {
      position: fixed; bottom: 1.25rem; right: 1.25rem;
      display: flex; flex-direction: column; gap: 0.4rem; z-index: 200;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.65rem 1rem;
      font-size: 0.8rem; box-shadow: var(--shadow);
      animation: slideIn 0.18s ease; max-width: 280px;
    }
    .toast-ok  { border-left: 3px solid var(--success); }
    .toast-err { border-left: 3px solid var(--error); }
    @keyframes slideIn { from { transform: translateX(110%); opacity:0; } to { transform:translateX(0); opacity:1; } }

    .divider { height: 1px; background: var(--border); margin: 1rem 0; }
    .flex { display: flex; align-items: center; }
    .gap-2 { gap: 0.5rem; }
    .empty { text-align: center; padding: 1.75rem 1rem; color: var(--text-muted); font-size: 0.85rem; }
    .empty .icon { font-size: 2rem; margin-bottom: 0.4rem; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .row-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.85rem; }

    .profiles-toolbar {
      display: flex; gap: 0.4rem;
      margin-bottom: 0.85rem;
      padding-bottom: 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    footer {
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
    .footer-sep { margin: 0 0.5rem; opacity: 0.4; }
    .footer-disclaimer { margin-top: 0.5rem; font-size: 0.7rem; opacity: 0.5; }
  </style>
</head>
<body>

<header>
  <div class="logo">📡</div>
  <div>
    <div class="header-title">BM <span>TG</span> Profiler</div>
    <div class="header-sub" data-i18n="header_sub"></div>
  </div>
  <div class="header-controls">
    <select id="langSelect" onchange="setLang(this.value)" title="Language / Język">
      <option value="en">🇬🇧 EN</option>
      <option value="pl">🇵🇱 PL</option>
    </select>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark mode"></button>
  </div>
</header>

<div class="container">
  <!-- Left column -->
  <div class="stack">

    <!-- Settings -->
    <div class="card">
      <div class="card-title" data-i18n="settings_title"></div>
      <div class="form-group">
        <label data-i18n="label_token"></label>
        <div class="input-wrap">
          <input id="token" type="password" data-i18n-placeholder="placeholder_token" />
          <button class="eye-btn" onclick="toggleToken()" title="Show/hide token">👁</button>
        </div>
        <div class="help"><span data-i18n="help_token"></span> <a href="https://news.brandmeister.network/introducing-user-api-keys/" target="_blank" data-i18n="link_token"></a></div>
      </div>
      <div class="form-group">
        <label data-i18n="label_callsign"></label>
        <input id="callsign" type="text" data-i18n-placeholder="placeholder_callsign" style="text-transform:uppercase" />
      </div>
      <div class="form-group">
        <label data-i18n="label_device"></label>
        <div class="add-row">
          <select id="deviceSelect" onchange="onDeviceSelect()" style="flex:1"></select>
          <button class="btn btn-secondary btn-sm" id="fetchDevicesBtn" onclick="fetchMyDevices()" data-i18n="btn_fetch" data-i18n-title="title_fetch"></button>
        </div>
        <div class="help" data-i18n="help_device"></div>
      </div>
      <div class="form-group">
        <label data-i18n="label_slot"></label>
        <select id="slot">
          <option value="0" selected data-i18n="slot_0"></option>
          <option value="1" data-i18n="slot_1"></option>
          <option value="2" data-i18n="slot_2"></option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" onclick="saveSettings()" data-i18n="btn_save_settings"></button>
    </div>

    <!-- Profiles -->
    <div class="card">
      <div class="card-title">
        <span data-i18n="profiles_title"></span>
        <button class="btn btn-secondary btn-sm" onclick="openCreate()" data-i18n="btn_new"></button>
      </div>
      <div class="profiles-toolbar">
        <button class="btn btn-ghost btn-sm" onclick="exportAllProfiles()" data-i18n="btn_export_all" data-i18n-title="title_export_all"></button>
        <button class="btn btn-ghost btn-sm" onclick="importAllProfiles()" data-i18n="btn_import_all" data-i18n-title="title_import_all"></button>
      </div>
      <div id="profileList" class="profile-list"></div>
    </div>

  </div>

  <!-- Right column -->
  <div class="stack">

    <!-- Apply -->
    <div class="card">
      <div class="card-title">
        <span data-i18n="apply_title"></span>
        <span id="statusBadge" class="badge badge-idle" data-i18n="badge_idle"></span>
      </div>
      <div id="selectedLabel" style="font-size:0.82rem;color:var(--text-muted);margin-bottom:0.75rem;" data-i18n="no_profile_selected"></div>
      <div class="steps" id="steps">
        <div class="step" id="s-delete"><div class="step-dot">1</div><span data-i18n="step_delete"></span></div>
        <div class="step" id="s-dynamic"><div class="step-dot">2</div><span data-i18n="step_dynamic"></span></div>
        <div class="step" id="s-call"><div class="step-dot">3</div><span data-i18n="step_call"></span></div>
        <div class="step" id="s-reset"><div class="step-dot">4</div><span data-i18n="step_reset"></span></div>
        <div class="step" id="s-add"><div class="step-dot">5</div><span data-i18n="step_add"></span></div>
      </div>
      <div class="row-btns">
        <button class="btn btn-primary" id="applyBtn" onclick="confirmApply()" disabled data-i18n="btn_apply"></button>
        <button class="btn btn-secondary" onclick="fetchCurrentGroups()" data-i18n="btn_view_groups"></button>
        <button class="btn btn-secondary" id="clearSlotBtn" onclick="clearSlot()" data-i18n="btn_clear_slot"></button>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="clearLog()" data-i18n="btn_clear_log"></button>
      </div>
    </div>

    <!-- Current groups (hidden until fetched) -->
    <div class="card" id="currentCard" style="display:none">
      <div class="card-title">
        <span id="currentCardTitle"></span>
        <button class="btn btn-secondary btn-sm" onclick="saveCurrentAsProfile()" data-i18n="btn_save_as_profile"></button>
      </div>
      <div id="currentContent"></div>
    </div>

    <!-- Log -->
    <div class="card">
      <div class="card-title" data-i18n="log_title"></div>
      <div class="log" id="log">
        <div class="log-row"><span class="log-ts">--:--:--</span><span class="c-muted" id="logReadyMsg"></span></div>
      </div>
    </div>

  </div>
</div>

<!-- Confirm Apply modal -->
<div id="confirmModal" class="overlay" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="modal-title" data-i18n="confirm_title"></div>
    <p id="confirmMsg" style="margin:0 0 0.4rem;line-height:1.5"></p>
    <p style="margin:0;font-size:0.8rem;color:var(--text-muted)" data-i18n="confirm_warning"></p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeConfirm()" data-i18n="btn_cancel"></button>
      <button class="btn btn-primary" id="confirmOkBtn" data-i18n="btn_apply_confirm"></button>
    </div>
  </div>
</div>

<!-- Create / Edit modal -->
<div id="modal" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="form-group">
      <label data-i18n="label_profile_name"></label>
      <input id="pName" type="text" data-i18n-placeholder="placeholder_profile_name" />
    </div>
    <div class="form-group">
      <label data-i18n="label_talk_groups"></label>
      <div id="modalTags" class="tags" style="min-height:28px"></div>
      <div class="add-row" style="margin-top:0.6rem">
        <input id="newTg" type="number" data-i18n-placeholder="placeholder_tg" onkeydown="tgKeydown(event)" />
        <button class="btn btn-secondary" onclick="addTg()" data-i18n="btn_add"></button>
      </div>
      <div class="help" data-i18n="help_tg"></div>
    </div>
    <div class="divider"></div>
    <div class="form-group">
      <label data-i18n="label_import_json"></label>
      <div class="add-row">
        <input id="importJson" type="text" data-i18n-placeholder="placeholder_import_json" />
        <button class="btn btn-secondary" onclick="importJson()" data-i18n="btn_paste"></button>
        <button class="btn btn-secondary" onclick="loadTgFromFile()" data-i18n="btn_file" data-i18n-title="title_file"></button>
      </div>
      <div class="help" data-i18n="help_json"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()" data-i18n="btn_cancel"></button>
      <button class="btn btn-primary" onclick="saveProfile()" data-i18n="btn_save_profile"></button>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <span>Ivo M · <a href="https://www.qrz.com/db/SP9ZEN" target="_blank">SP9ZEN</a></span>
  <span class="footer-sep">·</span>
  <a href="https://github.com/ivomod/bm-tg-profiler/blob/main/LICENSE" target="_blank">MIT License</a>
  <span class="footer-sep">·</span>
  <a href="https://github.com/ivomod/bm-tg-profiler" target="_blank">GitHub</a>
  <div class="footer-disclaimer" data-i18n="footer_disclaimer"></div>
</footer>

<!-- Toasts -->
<div id="toasts" class="toasts"></div>

<script>
  const API = 'https://api.brandmeister.network/v2';
  const TG_CACHE_TTL = 86400000; // 24 hours

  let profiles = [];
  let savedDevices = [];
  let tgCache = {};
  let currentGroups = [];
  let selectedId = null;
  let editingId = null;
  let tempGroups = [];
  let busy = false;
  let fetchingNames = false;

  // ── i18n ───────────────────────────────────────────────────────────────────
  const I18N = {
    en: {
      header_sub:            'BrandMeister Talk Group Profile Manager',
      settings_title:        '⚙️ Connection Settings',
      label_token:           'Step 1 — API Token',
      placeholder_token:     'Your BrandMeister API token',
      help_token:            'Your token is stored only in this browser and sent exclusively to the BrandMeister API. It is never shared with any third party.',
      link_token:            'Get your API token →',
      label_callsign:        'Step 2 — Your Callsign',
      placeholder_callsign:  'e.g. SP9ZEN',
      label_device:          'Step 3 — Device ID',
      option_select_device:  '— Select a saved device —',
      option_select_device2: '— Select a device —',
      btn_fetch:             '🔄 Fetch',
      title_fetch:           'Fetch devices from your BrandMeister account',
      help_device:           'Enter callsign first, then click 🔄 Fetch to load your devices.',
      label_slot:            'Time Slot',

  let currentLang = 'en';

  function t(key, vars = {}) {
    let str = (I18N[currentLang] ?? I18N.en)[key] ?? I18N.en[key] ?? key;
    for (const [k, v] of Object.entries(vars)) {
      str = str.replaceAll(`{${k}}`, v);
    }
    return str;
  }

  function applyLang() {
    document.documentElement.lang = currentLang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.dataset.i18nPlaceholder);
    });
    document.querySelectorAll('[data-i18n-title]').forEach(el => {
      el.title = t(el.dataset.i18nTitle);
    });
    document.querySelectorAll('#slot option[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    // Update logReadyMsg only if it's still the initial message (not overwritten by activity)
    const logReady = document.getElementById('logReadyMsg');
    if (logReady) logReady.textContent = t('log_ready');
    // Refresh dynamic renders that contain translated strings
    renderProfiles();
    if (selectedId) {
      const p = profiles.find(x => x.id === selectedId);
      document.getElementById('selectedLabel').textContent = p
        ? t('selected_prefix') + p.name
        : t('no_profile_selected');
    }
    document.getElementById('statusBadge').textContent = t(currentBadgeKey || 'badge_idle');
  }

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('bm_lang', lang);
    applyLang();
  }

  let currentBadgeKey = 'badge_idle';

  // ── Theme ──────────────────────────────────────────────────────────────────
  function applyTheme(theme) {
    document.documentElement.classList.toggle('light', theme === 'light');
    document.getElementById('themeBtn').textContent = theme === 'light' ? '🌙 Dark' : '☀️ Light';
  }

  function toggleTheme() {
    const next = document.documentElement.classList.contains('light') ? 'dark' : 'light';
    localStorage.setItem('bm_theme', next);
    applyTheme(next);
  }

  // ── Talk group name cache ──────────────────────────────────────────────────
  function loadTgCache() {
    try { tgCache = JSON.parse(localStorage.getItem('bm_tg_names') || '{}'); }
    catch { tgCache = {}; }
  }

  function saveTgCache() {
    localStorage.setItem('bm_tg_names', JSON.stringify(tgCache));
  }

  async function getTgName(id) {
    const cached = tgCache[id];
    if (cached !== undefined && (Date.now() - cached.ts < TG_CACHE_TTL)) return cached.name;
    try {
      const r = await fetch(`${API}/talkgroup/${id}`, { signal: AbortSignal.timeout(5000) });
      const name = r.ok ? ((await r.json()).Name || null) : null;
      tgCache[id] = { name, ts: Date.now() };
    } catch {
      tgCache[id] = { name: null, ts: Date.now() };
    }
    saveTgCache();
    return tgCache[id].name;
  }

  function tgLabel(id) {
    const name = tgCache[id]?.name;
    return name
      ? `${id}<span class="tg-name" title="${esc(name)}"> · ${esc(name)}</span>`
      : `${id}`;
  }

  async function prefetchAndRender(groups, renderFn) {
    if (fetchingNames) return;
    const missing = groups.filter(id => {
      const c = tgCache[id];
      return c === undefined || (Date.now() - c.ts > TG_CACHE_TTL);
    });
    if (!missing.length) return;
    fetchingNames = true;
    await Promise.allSettled(missing.map(getTgName));
    fetchingNames = false;
    renderFn();
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  function init() {
    currentLang = localStorage.getItem('bm_lang') || 'en';
    document.getElementById('langSelect').value = currentLang;
    applyTheme(localStorage.getItem('bm_theme') || 'dark');
    loadTgCache();
    savedDevices = JSON.parse(localStorage.getItem('bm_devices') || '[]');
    const s = loadSettings();
    document.getElementById('callsign').value = (s.callsign || '').toUpperCase();
    document.getElementById('token').value    = s.token || '';
    document.getElementById('slot').value     = s.slot  || '0';
    renderDeviceSelect(s.deviceId || '');
    profiles = JSON.parse(localStorage.getItem('bm_profiles') || '[]');
    applyLang();
  }

  function loadSettings() {
    try { return JSON.parse(localStorage.getItem('bm_settings') || '{}'); }
    catch { return {}; }
  }

  function saveSettings() {
    const deviceId = document.getElementById('deviceSelect').value;
    localStorage.setItem('bm_settings', JSON.stringify({
      deviceId,
      callsign: val('callsign').toUpperCase(),
      token: val('token'),
      slot:  val('slot'),
    }));
    toast(t('toast_settings_saved'), 'ok');
  }

  function getConn() {
    return {
      deviceId: document.getElementById('deviceSelect').value,
      token:    val('token'),
      slot:     parseInt(val('slot')),
    };
  }

  // ── Device dropdown ────────────────────────────────────────────────────────
  function renderDeviceSelect(currentId = '') {
    const sel = document.getElementById('deviceSelect');
    sel.innerHTML = `<option value="">${t('option_select_device')}</option>` +
      savedDevices.map(d =>
        `<option value="${esc(d)}" ${d === currentId ? 'selected' : ''}>${esc(d)}</option>`
      ).join('');
  }

  function onDeviceSelect() {}

  async function fetchMyDevices() {
    const token    = val('token').trim();
    const callsign = val('callsign').trim().toUpperCase();
    if (!token)    { toast(t('err_token'), 'err'); return; }
    if (!callsign) { toast(t('err_callsign'), 'err'); return; }

    const btn = document.getElementById('fetchDevicesBtn');
    btn.disabled = true;
    btn.textContent = '⏳';

    try {
      const r = await fetch(`${API}/device/byCall?callsign=${encodeURIComponent(callsign)}`, {
        headers: { 'Authorization': `Bearer ${token}` },
        signal: AbortSignal.timeout(15000),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const devices = await r.json();

      if (!Array.isArray(devices) || !devices.length) {
        toast(t('toast_devices_none', { cs: callsign }), 'err');
        return;
      }

      let added = 0;
      devices.forEach(d => {
        const id = String(d.id);
        if (!savedDevices.includes(id)) { savedDevices.push(id); added++; }
      });
      localStorage.setItem('bm_devices', JSON.stringify(savedDevices));

      const sel = document.getElementById('deviceSelect');
      sel.innerHTML = `<option value="">${t('option_select_device2')}</option>` +
        devices.map(d =>
          `<option value="${esc(String(d.id))}">${esc(d.callsign)} — ${esc(d.linkname)} (${d.id})</option>`
        ).join('');

      const addedPart = added ? t('toast_new_devices', { n: added }) : '';
      const s = devices.length !== 1
        ? (currentLang === 'pl' ? 'a' : 's')
        : '';
      toast(t('toast_devices_ok', { n: devices.length, s, cs: callsign, added: addedPart }), 'ok');
    } catch (e) {
      toast(t('toast_fail_devices', { msg: e.message }), 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = t('btn_fetch');
    }
  }

  function toggleToken() {
    const inp = document.getElementById('token');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  // ── Profiles ───────────────────────────────────────────────────────────────
  function tgCountLabel(n) {
    if (currentLang === 'pl') {
      if (n === 1) return `1 grupa wywołania`;
      if (n >= 2 && n <= 4) return `${n} grupy wywołania`;
      return `${n} grup wywołania`;
    }
    return `${n} talk group${n !== 1 ? 's' : ''}`;
  }

  function renderProfiles() {
    const el = document.getElementById('profileList');
    if (!profiles.length) {
      const lines = t('profile_empty').split('\n');
      el.innerHTML = `<div class="empty"><div class="icon">📋</div>${lines[0]}${lines[1] ? `<br>${lines[1]}` : ''}</div>`;
      return;
    }
    el.innerHTML = profiles.map(p => `
      <div class="profile-item ${p.id === selectedId ? 'selected' : ''}" onclick="selectProfile('${p.id}')">
        <div class="profile-name">${esc(p.name)}</div>
        <div class="profile-meta">${tgCountLabel(p.groups.length)}</div>
        <div class="tags">
          ${p.groups.slice(0, 10).map(g => `<span class="tag">${tgLabel(g)}</span>`).join('')}
          ${p.groups.length > 10 ? `<span class="tag">${t('more_groups', { n: p.groups.length - 10 })}</span>` : ''}
        </div>
        <div class="profile-actions">
          <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openEdit('${p.id}')">${t('btn_edit')}</button>
          <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();exportProfile('${p.id}')">${t('btn_export')}</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteProfile('${p.id}')">${t('btn_delete')}</button>
          <button class="btn btn-primary btn-sm ml-auto" onclick="event.stopPropagation();quickApply('${p.id}')">${t('btn_quick_apply')}</button>
        </div>
      </div>
    `).join('');

    const allGroups = [...new Set(profiles.flatMap(p => p.groups))];
    prefetchAndRender(allGroups, renderProfiles);
  }

  function selectProfile(id) {
    selectedId = id;
    const p = profiles.find(x => x.id === id);
    document.getElementById('selectedLabel').textContent = p
      ? t('selected_prefix') + p.name
      : t('no_profile_selected');
    document.getElementById('applyBtn').disabled = !p;
    renderProfiles();
  }

  function quickApply(id) {
    selectProfile(id);
    confirmApply();
  }

  function openCreate() {
    editingId = null; tempGroups = [];
    document.getElementById('modalTitle').textContent = t('modal_new');
    document.getElementById('pName').value = '';
    document.getElementById('importJson').value = '';
    document.getElementById('newTg').value = '';
    renderModalTags();
    document.getElementById('modal').style.display = 'flex';
  }

  function openEdit(id) {
    const p = profiles.find(x => x.id === id);
    if (!p) return;
    editingId = id; tempGroups = [...p.groups];
    document.getElementById('modalTitle').textContent = t('modal_edit');
    document.getElementById('pName').value = p.name;
    document.getElementById('importJson').value = '';
    document.getElementById('newTg').value = '';
    renderModalTags();
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  function tgKeydown(e) { if (e.key === 'Enter') addTg(); }

  function addTg() {
    const inp = document.getElementById('newTg');
    const n = parseInt(inp.value.trim());
    if (!isNaN(n) && n > 0 && !tempGroups.includes(n)) {
      tempGroups.push(n);
      tempGroups.sort((a,b) => a-b);
      renderModalTags();
    }
    inp.value = ''; inp.focus();
  }

  function removeTg(n) {
    tempGroups = tempGroups.filter(g => g !== n);
    renderModalTags();
  }

  function renderModalTags() {
    document.getElementById('modalTags').innerHTML =
      tempGroups.map(g => `<span class="tag">${tgLabel(g)}<span class="tag-x" onclick="removeTg(${g})">×</span></span>`).join('');
    prefetchAndRender(tempGroups, renderModalTags);
  }

  function importJson() {
    const raw = val('importJson').trim();
    try {
      const parsed = JSON.parse(raw);
      const arr = Array.isArray(parsed) ? parsed : (parsed.static_groups || []);
      let added = 0;
      arr.forEach(g => {
        const n = parseInt(g);
        if (!isNaN(n) && n > 0 && !tempGroups.includes(n)) { tempGroups.push(n); added++; }
      });
      tempGroups.sort((a,b) => a-b);
      renderModalTags();
      document.getElementById('importJson').value = '';
      toast(t('toast_import_tg', { n: added }), 'ok');
    } catch { toast(t('toast_invalid_json'), 'err'); }
  }

  function saveProfile() {
    const name = val('pName').trim();
    if (!name) { toast(t('err_no_name'), 'err'); return; }
    if (!tempGroups.length) { toast(t('err_no_tgs'), 'err'); return; }

    if (editingId) {
      const i = profiles.findIndex(p => p.id === editingId);
      profiles[i] = { ...profiles[i], name, groups: tempGroups };
    } else {
      profiles.push({ id: Date.now().toString(), name, groups: tempGroups });
    }
    persist(); renderProfiles(); closeModal();
    toast(t('toast_profile_saved'), 'ok');
  }

  function deleteProfile(id) {
    if (!confirm(t('confirm_delete_profile'))) return;
    profiles = profiles.filter(p => p.id !== id);
    if (selectedId === id) {
      selectedId = null;
      document.getElementById('selectedLabel').textContent = t('no_profile_selected');
      document.getElementById('applyBtn').disabled = true;
    }
    persist(); renderProfiles();
    toast(t('toast_profile_deleted'), 'ok');
  }

  function exportProfile(id) {
    const p = profiles.find(x => x.id === id);
    if (!p) return;
    const blob = new Blob([JSON.stringify({ static_groups: p.groups }, null, 2)], { type: 'application/json' });
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: `${p.name.replace(/\s+/g,'_')}.json` });
    a.click(); URL.revokeObjectURL(a.href);
  }

  function persist() { localStorage.setItem('bm_profiles', JSON.stringify(profiles)); }

  function exportAllProfiles() {
    if (!profiles.length) { toast(t('toast_no_profiles'), 'err'); return; }
    const blob = new Blob([JSON.stringify({ profiles }, null, 2)], { type: 'application/json' });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: 'bm-profiles.json',
    });
    a.click(); URL.revokeObjectURL(a.href);
    toast(t('toast_exported', { n: profiles.length }), 'ok');
  }

  function importAllProfiles() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json,application/json';
    input.onchange = async () => {
      const file = input.files[0];
      if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        const incoming = data.profiles || (Array.isArray(data) ? data : null);
        if (!Array.isArray(incoming)) { toast(t('toast_invalid_format'), 'err'); return; }
        if (!confirm(t('confirm_replace', { n: profiles.length, m: incoming.length }))) return;
        profiles = incoming;
        persist(); renderProfiles();
        toast(t('toast_imported', { n: incoming.length }), 'ok');
      } catch { toast(t('toast_invalid_file'), 'err'); }
    };
    input.click();
  }

  function loadTgFromFile() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json,application/json';
    input.onchange = async () => {
      const file = input.files[0];
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        const arr = Array.isArray(parsed) ? parsed : (parsed.static_groups || []);
        let added = 0;
        arr.forEach(g => {
          const n = parseInt(g);
          if (!isNaN(n) && n > 0 && !tempGroups.includes(n)) { tempGroups.push(n); added++; }
        });
        tempGroups.sort((a,b) => a-b);
        renderModalTags();
        toast(t('toast_load_tg', { n: added }), 'ok');
      } catch { toast(t('toast_invalid_file'), 'err'); }
    };
    input.click();
  }

  // ── API ────────────────────────────────────────────────────────────────────
  async function req(method, path, body, token) {
    const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    const r = await fetch(`${API}${path}`, { method, headers, body: body ? JSON.stringify(body) : undefined });
    if (!r.ok) {
      const txt = await r.text().catch(() => '');
      throw new Error(`HTTP ${r.status}${txt ? ': ' + txt : ''}`);
    }
    return r;
  }

  async function fetchCurrentGroups() {
    const { deviceId, token, slot } = getConn();
    if (!deviceId || !token) { toast(t('err_no_device_token'), 'err'); return; }
    log(t('log_fetching_groups', { slot }), 'info');
    try {
      const r = await req('GET', `/device/${deviceId}/talkgroup`, null, token);
      const all = await r.json();
      const groups = all.filter(g => parseInt(g.slot) === slot);
      const card = document.getElementById('currentCard');
      const content = document.getElementById('currentContent');
      document.getElementById('currentCardTitle').textContent = t('current_card_title', { slot });
      currentGroups = groups.map(g => parseInt(g.talkgroup));
      card.style.display = 'block';
      if (!groups.length) {
        content.innerHTML = `<div class="empty">${t('no_groups_on_slot', { slot })}</div>`;
      } else {
        const renderChips = () => {
          content.innerHTML = `
            <div class="help" style="margin-bottom:0.5rem">${t('groups_count_on_slot', { n: groups.length, slot })}</div>
            <div class="group-chips">
              ${groups.map(g => {
                const name = tgCache[g.talkgroup]?.name;
                return `<span class="chip">${g.talkgroup}${name ? ` <span class="tg-name" style="max-width:none"> · ${esc(name)}</span>` : ''}</span>`;
              }).join('')}
            </div>`;
        };
        renderChips();
        prefetchAndRender(groups.map(g => g.talkgroup), renderChips);
      }
      log(t('log_found_groups', { n: groups.length, slot }), 'success');
    } catch (e) {
      log(t('log_err_generic', { msg: e.message }), 'error');
      toast(t('toast_fail_fetch'), 'err');
    }
  }

  function saveCurrentAsProfile() {
    if (!currentGroups.length) { toast(t('toast_no_groups'), 'err'); return; }
    editingId = null;
    tempGroups = [...currentGroups];
    document.getElementById('modalTitle').textContent = t('modal_new_from_current');
    document.getElementById('pName').value = '';
    document.getElementById('importJson').value = '';
    document.getElementById('newTg').value = '';
    renderModalTags();
    document.getElementById('modal').style.display = 'flex';
  }

  async function clearSlot() {
    if (busy) return;
    const { deviceId, token, slot } = getConn();
    if (!deviceId || !token) { toast(t('err_no_device_token'), 'err'); return; }

    const r0 = await req('GET', `/device/${deviceId}/talkgroup`, null, token).catch(() => null);
    if (!r0) { toast(t('toast_fail_fetch'), 'err'); return; }
    const toDelete = (await r0.json()).filter(g => parseInt(g.slot) === slot);

    if (!toDelete.length) { toast(t('err_no_static_groups', { slot }), 'err'); return; }
    if (!confirm(t('confirm_clear_slot', { n: toDelete.length, slot, deviceId }))) return;

    busy = true;
    document.getElementById('clearSlotBtn').disabled = true;
    logSep();
    log(t('log_clearing', { n: toDelete.length, slot }), 'info');
    try {
      await Promise.all(toDelete.map(async g => {
        await req('DELETE', `/device/${deviceId}/talkgroup/${g.slot}/${g.talkgroup}`, null, token);
        const name = tgCache[g.talkgroup]?.name;
        log(t('log_deleted_group', { id: g.talkgroup, name: name ? ` (${name})` : '', slot: g.slot }), 'info');
      }));
      log(t('log_cleared_ok', { n: toDelete.length, slot }), 'success');
      toast(t('toast_clear_ok', { slot }), 'ok');
      fetchCurrentGroups();
    } catch (e) {
      log(t('log_err_generic', { msg: e.message }), 'error');
      toast(t('toast_fail_clear'), 'err');
    } finally {
      busy = false;
      document.getElementById('clearSlotBtn').disabled = false;
    }
  }

  function confirmApply() {
    if (busy) return;
    const { deviceId, token, slot } = getConn();
    if (!deviceId || !token) { toast(t('err_no_device_token'), 'err'); return; }
    const profile = profiles.find(p => p.id === selectedId);
    if (!profile) { toast(t('err_no_profile'), 'err'); return; }

    const slotLabel = slot === 0 ? t('slot_0') : `Slot ${slot}`;
    document.getElementById('confirmMsg').innerHTML =
      `Profile <strong>${profile.name}</strong> — ${tgCountLabel(profile.groups.length)} on <strong>${slotLabel}</strong>.`;

    const modal = document.getElementById('confirmModal');
    modal.style.display = 'flex';
    const okBtn = document.getElementById('confirmOkBtn');
    okBtn.onclick = () => { closeConfirm(); applyProfile(); };
  }

  function closeConfirm() {
    document.getElementById('confirmModal').style.display = 'none';
  }

  async function applyProfile() {
    if (busy) return;
    const { deviceId, token, slot } = getConn();
    if (!deviceId || !token) { toast(t('err_no_device_token'), 'err'); return; }
    const profile = profiles.find(p => p.id === selectedId);
    if (!profile) { toast(t('err_no_profile'), 'err'); return; }

    busy = true;
    document.getElementById('applyBtn').disabled = true;
    setBadge('run', 'badge_run');
    resetSteps();

    logSep();
    log(t('log_applying', { name: profile.name }), 'info');
    log(t('log_applying_groups', { n: profile.groups.length, groups: profile.groups.join(', ') }), 'info');

    try {
      // 1 – Delete existing static groups on the selected slot only
      setStep('delete', 'run');
      log(t('log_fetching_existing'), 'info');
      const r = await req('GET', `/device/${deviceId}/talkgroup`, null, token);
      const existing = await r.json();
      const toDelete = existing.filter(g => parseInt(g.slot) === slot);
      const skipped  = existing.length - toDelete.length;
      const skippedPart = skipped ? t('log_skipped', { n: skipped }) : '';
      log(t('log_deleting_groups', { n: toDelete.length, slot, skipped: skippedPart }), 'info');
      await Promise.all(toDelete.map(async g => {
        await req('DELETE', `/device/${deviceId}/talkgroup/${g.slot}/${g.talkgroup}`, null, token);
        const name = tgCache[g.talkgroup]?.name;
        log(t('log_deleted_group', { id: g.talkgroup, name: name ? ` (${name})` : '', slot: g.slot }), 'info');
      }));
      setStep('delete', 'done');
      log(t('log_deleted_ok', { n: toDelete.length, slot }), 'success');

      // 2 – Drop dynamic groups
      setStep('dynamic', 'run');
      await req('GET', `/device/${deviceId}/action/dropDynamicGroups/${slot}`, null, token);
      setStep('dynamic', 'done');
      log(t('log_dropped_dynamic'), 'success');

      // 3 – Drop current call
      setStep('call', 'run');
      await req('GET', `/device/${deviceId}/action/dropCallRoute/${slot}`, null, token);
      setStep('call', 'done');
      log(t('log_dropped_call'), 'success');

      // 4 – Reset connection
      setStep('reset', 'run');
      await req('GET', `/device/${deviceId}/action/removeContext`, null, token);
      setStep('reset', 'done');
      log(t('log_reset_conn'), 'success');

      // 5 – Add new static groups
      setStep('add', 'run');
      log(t('log_adding_groups', { n: profile.groups.length }), 'info');
      await Promise.all(profile.groups.map(async g => {
        await req('POST', `/device/${deviceId}/talkgroup`, { group: g, slot }, token);
        const name = tgCache[g]?.name;
        log(t('log_added_group', { id: g, name: name ? ` (${name})` : '', slot }), 'info');
      }));
      setStep('add', 'done');
      log(t('log_added_ok', { n: profile.groups.length }), 'success');

      setBadge('ok', 'badge_ok');
      log(t('log_success'), 'success');
      toast(t('toast_profile_applied'), 'ok');

    } catch (e) {
      log(t('log_error', { msg: e.message }), 'error');
      setBadge('err', 'badge_err');
      toast(t('toast_fail_apply'), 'err');
      document.querySelector('.step.s-run')?.classList.replace('s-run', 's-err');
    } finally {
      busy = false;
      document.getElementById('applyBtn').disabled = false;
    }
  }

  // ── Step / badge helpers ───────────────────────────────────────────────────
  const STEPS = ['delete', 'dynamic', 'call', 'reset', 'add'];

  function resetSteps() {
    STEPS.forEach((s, i) => {
      const el = document.getElementById(`s-${s}`);
      el.className = 'step';
      el.querySelector('.step-dot').textContent = i + 1;
    });
  }

  function setStep(name, state) {
    const el = document.getElementById(`s-${name}`);
    el.className = `step s-${state}`;
    const dot = el.querySelector('.step-dot');
    if (state === 'done') dot.textContent = '✓';
    else if (state === 'err') dot.textContent = '✗';
    else dot.textContent = '…';
  }

  function setBadge(type, key) {
    currentBadgeKey = key;
    const b = document.getElementById('statusBadge');
    b.className = `badge badge-${type}`;
    b.textContent = t(key);
  }

  // ── Log helpers ────────────────────────────────────────────────────────────
  function log(msg, type = 'info') {
    const logEl = document.getElementById('log');
    // Remove placeholder ready message on first real log entry
    const readyMsg = document.getElementById('logReadyMsg');
    if (readyMsg) readyMsg.closest('.log-row')?.remove();

    const ts = new Date().toTimeString().slice(0,8);
    const cls = type === 'success' ? 'c-success' : type === 'error' ? 'c-error' : 'c-info';
    const row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML = `<span class="log-ts">${ts}</span><span class="${cls}">${esc(msg)}</span>`;
    logEl.appendChild(row);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function logSep() {
    const c = document.getElementById('log');
    const d = document.createElement('div');
    d.className = 'log-sep';
    c.appendChild(d);
  }

  function clearLog() {
    const logEl = document.getElementById('log');
    logEl.innerHTML = `<div class="log-row"><span class="log-ts">--:--:--</span><span class="c-muted" id="logReadyMsg">${t('log_ready')}</span></div>`;
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  function toast(msg, type = 'ok') {
    const c = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  // ── Utilities ──────────────────────────────────────────────────────────────
  function val(id) { return document.getElementById(id).value; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  init();
</script>
</body>
</html>
